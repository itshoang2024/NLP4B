# ══════════════════════════════════════════════════════════════════════════════
# docker-compose.yml — Embedding-as-a-Service (Standalone)
# ══════════════════════════════════════════════════════════════════════════════
# Target: Azure VM Standard_B4as_v2 (4 vCPU, 16GB RAM)
#
# Quick start:
#   docker compose up -d --build
#   curl http://localhost:8000/health
# ══════════════════════════════════════════════════════════════════════════════

services:
  embedding_service:
    build:
      context: ./embedding_service
      dockerfile: Dockerfile
    container_name: embedding_service
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 14G      # Leave ~2GB for OS
          cpus: "3.5"      # Leave 0.5 CPU for OS
    volumes:
      # Mount HuggingFace cache from host → models survive container restarts
      - ${HF_CACHE_DIR:-~/.cache/huggingface}:/root/.cache/huggingface
    environment:
      - HF_HOME=/root/.cache/huggingface
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      start_period: 180s   # Models take ~2-3 min to load on CPU
      retries: 3
